version: "3.9"

# =============================================
# Molido AI — اجرای کامل با Docker
# قبل از اجرا: cp .env.example .env و مقادیر را تغییر دهید
# ⚠️ در production حتماً JWT_SECRET و رمزها را عوض کنید
# =============================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-molido_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - molido_net

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-molido_ai}?schema=public
      JWT_SECRET: ${JWT_SECRET:-molido_dev_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-molido_dev_refresh_change_me}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER: ${SMS_SENDER:-10008663}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-molido_n8n_secret}
      N8N_BASE_URL: http://n8n:5678
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - molido_net

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3001"
    networks:
      - molido_net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      WEBHOOK_URL: http://localhost:5678/
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin123}
      MOLIDO_API_URL: http://backend:3000
      MOLIDO_API_SECRET: ${N8N_WEBHOOK_SECRET:-molido_n8n_secret}
      N8N_DIAGNOSTICS_ENABLED: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - molido_net

volumes:
  postgres_data:
  uploads_data:
  n8n_data:

networks:
  molido_net:
    driver: bridge
